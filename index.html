<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0d0a">
<title>Jonathan Ellis · Independent Developer</title>
<meta name="description" content="Independent developer in Canada. Three.js, Hetzner, native Mac apps, custom tooling for small businesses.">
<link rel="icon" type="image/svg+xml" href="/public/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="preload" href="/public/j.glb" as="fetch" type="model/gltf-binary" crossorigin="anonymous">

<style>
  :root {
    --bg: #0a0d0a;
    --bg-2: #050705;
    --border: #1a241a;
    --line: rgba(232, 240, 232, 0.08);
    --text: #e8f0e8;
    --text-dim: #8a9a8a;
    --text-fade: #4a5a4a;
    --accent: #00e640;
    --accent-soft: #28c840;
    --warn: #febc2e;
    --hot: #ff5f57;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 400;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background:
      radial-gradient(ellipse at center, rgba(0, 230, 64, 0.04) 0%, transparent 55%),
      var(--bg);
  }

  /* ============================================================
     CANVAS — the J scene fills the whole viewport
     ============================================================ */
  #scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    cursor: grab;
  }
  #scene:active { cursor: grabbing; }
  #scene canvas { display: block; width: 100%; height: 100%; }

  /* ============================================================
     LOADER
     ============================================================ */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s ease 0.2s, visibility 0.6s ease 0.2s;
  }
  #loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }
  #loader .ring {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 18px;
  }
  #loader .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============================================================
     OVERLAY UI — pointer-events: none on the wrapper, on for children
     ============================================================ */
  .ui {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    pointer-events: none;
    padding: 28px 36px 32px;
  }
  .ui > * { pointer-events: auto; }

  @media (max-width: 720px) {
    .ui { padding: 18px 18px 22px; }
  }

  /* ============================================================
     HEADER
     ============================================================ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.2s;
  }
  .brand em {
    color: var(--accent);
    font-style: normal;
  }
  .brand:hover { color: var(--text); }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-fade);
    text-transform: uppercase;
  }
  .status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(0, 230, 64, 0.6);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @media (max-width: 540px) { .status .label { display: none; } }

  /* ============================================================
     CENTER (just spacer — J is in the canvas)
     ============================================================ */
  .center { pointer-events: none; }

  /* ============================================================
     BOTTOM CONTENT
     ============================================================ */
  .bottom {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 24px;
    pointer-events: none;
  }
  .bottom > * { pointer-events: auto; }

  .name {
    font-family: var(--font-sans);
    font-weight: 200;
    font-size: clamp(28px, 5.5vw, 64px);
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--text);
  }
  .name strong { font-weight: 600; }
  .tag {
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    justify-self: center;
  }
  .links a {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 0;
    border-bottom: 1px solid transparent;
    transition: all 0.2s;
  }
  .links a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-fade);
    text-align: right;
    line-height: 1.8;
  }
  .meta b {
    font-weight: 400;
    color: var(--text-dim);
  }

  @media (max-width: 720px) {
    .bottom {
      grid-template-columns: 1fr;
      gap: 22px;
    }
    .links {
      flex-direction: row;
      flex-wrap: wrap;
      justify-self: start;
      gap: 18px;
    }
    .meta { display: none; }
  }

  /* ============================================================
     SKIN SELECTOR — vertical rail, top-right
     ============================================================ */
  #skin-rail {
    position: fixed;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    z-index: 6;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 8px;
    background: rgba(10, 13, 10, 0.72);
    border: 1px solid var(--line);
    border-radius: 8px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  #skin-rail button {
    appearance: none;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-fade);
    cursor: pointer;
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.18s ease;
    text-align: left;
    min-width: 110px;
    position: relative;
  }
  #skin-rail button:hover {
    color: var(--text-dim);
    background: rgba(232, 240, 232, 0.04);
  }
  #skin-rail button.active {
    color: var(--accent);
    background: rgba(0, 230, 64, 0.08);
    border-color: rgba(0, 230, 64, 0.3);
  }
  #skin-rail button .num {
    color: var(--text-fade);
    font-size: 8px;
    margin-right: 8px;
    transition: color 0.18s;
  }
  #skin-rail button.active .num {
    color: var(--accent);
  }

  @media (max-width: 720px) {
    #skin-rail {
      top: auto;
      bottom: 90px;
      right: 50%;
      transform: translateX(50%);
      flex-direction: row;
      gap: 4px;
      padding: 6px;
      max-width: calc(100vw - 24px);
      overflow-x: auto;
    }
    #skin-rail button {
      min-width: auto;
      padding: 6px 10px;
    }
    #skin-rail button .num { display: none; }
  }

  /* ============================================================
     PARAM CONTROLS — left side, contextual to skin
     ============================================================ */
  #params {
    position: fixed;
    top: 50%;
    left: 28px;
    transform: translateY(-50%);
    z-index: 6;
    width: 220px;
    padding: 16px 18px;
    background: rgba(10, 13, 10, 0.72);
    border: 1px solid var(--line);
    border-radius: 8px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    opacity: 0;
    transform: translateY(-50%) translateX(-12px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  #params.show {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
    pointer-events: auto;
  }
  #params .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  #params .header .title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #params .header button.reset {
    appearance: none;
    background: none;
    border: none;
    color: var(--text-fade);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  #params .header button.reset:hover { color: var(--accent); }

  .control {
    margin-bottom: 12px;
  }
  .control:last-child { margin-bottom: 0; }
  .control .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .control label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .control .val {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text);
    min-width: 30px;
    text-align: right;
  }
  .control input[type=range] {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }
  .control input[type=range]::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 0 2px var(--bg);
  }
  .control input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 0 2px var(--bg);
  }

  .control .toggle {
    display: flex;
    gap: 4px;
  }
  .control .toggle button {
    flex: 1;
    appearance: none;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-fade);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 6px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .control .toggle button:hover { color: var(--text-dim); }
  .control .toggle button.on {
    color: var(--accent);
    border-color: rgba(0, 230, 64, 0.4);
    background: rgba(0, 230, 64, 0.06);
  }

  @media (max-width: 720px) {
    #params {
      top: auto;
      bottom: 130px;
      left: 12px;
      right: 12px;
      width: auto;
      transform: translateY(8px);
    }
    #params.show { transform: translateY(0); }
  }

  /* ============================================================
     CURSOR HINT — subtle drag-me note that fades out after first interaction
     ============================================================ */
  #hint {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(-50% + 180px));
    z-index: 4;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-fade);
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  #hint.show { opacity: 1; }
  #hint.gone { opacity: 0; }
  @media (max-width: 540px) { #hint { display: none; } }

  /* ============================================================
     KEY HINTS at bottom (1-8 to switch skins)
     ============================================================ */
  #keyhints {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-fade);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #keyhints.show { opacity: 1; }
  #keyhints kbd {
    display: inline-block;
    padding: 2px 6px;
    margin: 0 2px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
    color: var(--text-dim);
  }
  @media (max-width: 720px) { #keyhints { display: none; } }
</style>
</head>
<body>

<!-- ============================================================
     LOADER
     ============================================================ -->
<div id="loader">
  <div class="ring"></div>
  <div class="label">Loading scene</div>
</div>

<!-- ============================================================
     CANVAS HOST
     ============================================================ -->
<div id="scene"></div>

<!-- ============================================================
     CURSOR HINT
     ============================================================ -->
<div id="hint">drag · scroll for skin</div>

<!-- ============================================================
     SKIN RAIL — top-right vertical
     ============================================================ -->
<nav id="skin-rail" aria-label="Skin selector">
  <button data-skin="metallic"   class="active"><span class="num">01</span>Metallic</button>
  <button data-skin="lasers"><span class="num">02</span>Lasers</button>
  <button data-skin="lava"><span class="num">03</span>Lava</button>
  <button data-skin="water"><span class="num">04</span>Water</button>
  <button data-skin="iridescent"><span class="num">05</span>Iridescent</button>
  <button data-skin="stones"><span class="num">06</span>Stones</button>
  <button data-skin="fuzzy"><span class="num">07</span>Fuzzy</button>
  <button data-skin="vines"><span class="num">08</span>Vines</button>
</nav>

<!-- ============================================================
     PARAM PANEL — populated by JS per skin
     ============================================================ -->
<aside id="params">
  <div class="header">
    <span class="title">Params</span>
    <button class="reset">Reset</button>
  </div>
  <div id="param-body"></div>
</aside>

<!-- ============================================================
     KEYBOARD HINTS
     ============================================================ -->
<div id="keyhints"><kbd>1</kbd>–<kbd>8</kbd> skin · <kbd>R</kbd> reset · <kbd>P</kbd> params</div>

<!-- ============================================================
     OVERLAY UI
     ============================================================ -->
<div class="ui">
  <header>
    <a class="brand" href="/" aria-label="Jonathan Ellis">jonathan<em>ellis</em>.dev</a>
    <div class="status"><span class="dot"></span><span class="label">independent · canada</span></div>
  </header>

  <div class="center"></div>

  <div class="bottom">
    <div>
      <div class="name">Jonathan <strong>Ellis</strong></div>
      <div class="tag">Independent developer · custom tooling for small businesses</div>
    </div>
    <div class="links">
      <a href="https://jonathanellis.ca" target="_blank" rel="noopener">Portfolio</a>
      <a href="https://jonathanellis.work" target="_blank" rel="noopener">Work</a>
      <a href="mailto:hello@jonathanellis.dev">hello@jonathanellis.dev</a>
    </div>
    <div class="meta">
      <b>Server</b> · Hetzner / Nuremberg<br>
      <b>Stack</b> · Three.js · WebGL2<br>
      <b>Build</b> · 2026.04
    </div>
  </div>
</div>

<!-- ============================================================
     IMPORT MAP — Three.js modules from unpkg
     ============================================================ -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
  }
}
</script>
<script type="module" src="/public/j-scene.js?v=1"></script>

</body>
</html>
